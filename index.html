<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory Puzzle</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    width: 95vw;
    max-width: 600px;
  }

  .grid img {
    width: 100%;
    height: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    opacity: 0;
    transform: scale(0.6);
    transition: all 0.5s ease;
    border-radius: 8px;
  }

  .grid img.show {
    opacity: 1;
    transform: scale(1);
  }

  /* glow title */
  .title {
    position: absolute;
    top: 20px;
    color: white;
    font-size: 22px;
    text-align: center;
    width: 100%;
    font-family: Arial;
    text-shadow: 0 0 10px pink, 0 0 20px red;
  }
</style>
</head>

<body>

<div class="title">💖 I Love You Lakshita Sharma 💖</div>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

// create 25 images automatically
for (let i = 1; i <= 25; i++) {
  const img = document.createElement("img");
  img.src = `img${i}.jpg`;
  img.alt = "image " + i;
  grid.appendChild(img);
}

// reveal animation one by one
const images = document.querySelectorAll("img");

images.forEach((img, index) => {
  setTimeout(() => {
    img.classList.add("show");
  }, index * 200); // speed control
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* 🌳 BACKGROUND TREE */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('tree.jpg') center/cover no-repeat;
    z-index: -1;
}

/* 💖 CENTER CONTAINER BETWEEN TREES */
.photo-container {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 420px;   /* adjust if needed */
    height: 520px;
    transform: translate(-50%, -50%);
}

/* 📸 IMAGES */
.photo-container img {
    position: absolute;
    width: 95px;
    height: 95px;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.5s;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

/* ✨ TEXT */
.love-text {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: white;
    text-shadow: 0 0 10px pink, 0 0 20px red;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 25px red, 0 0 40px pink; }
}
</style>
</head>

<body>

<div class="background"></div>

<!-- ❤️ PHOTOS -->
<div class="photo-container" id="container">

    <!-- PUT YOUR 25 IMAGES -->
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
    <img src="5.jpg">
    <img src="6.jpg">
    <img src="7.jpg">
    <img src="8.jpg">
    <img src="9.jpg">
    <img src="10.jpg">
    <img src="11.jpg">
    <img src="12.jpg">
    <img src="13.jpg">
    <img src="14.jpg">
    <img src="15.jpg">
    <img src="16.jpg">
    <img src="17.jpg">
    <img src="18.jpg">
    <img src="19.jpg">
    <img src="20.jpg">
    <img src="21.jpg">
    <img src="22.jpg">
    <img src="23.jpg">
    <img src="24.jpg">
    <img src="25.jpg">

</div>

<!-- 💕 TEXT -->
<div class="love-text">
    I loveeeee youuuuuu sooo muchhh myyy darlinggg ❤️
</div>

<!-- 🎶 MUSIC -->
<audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const images = document.querySelectorAll(".photo-container img");

images.forEach((img, i) => {

    // 🎯 PERFECT CENTER SPREAD (NOT FULL SCREEN)
    let x = Math.random() * 300;
    let y = Math.random() * 400;

    img.style.left = x + "px";
    img.style.top = y + "px";

    // 🎯 slight rotation for aesthetic
    let rotate = Math.random() * 20 - 10;
    img.style.transform = `rotate(${rotate}deg)`;

    // 🎬 reel-style appearing
    img.style.opacity = 0;

    setTimeout(() => {
        img.style.opacity = 1;
    }, i * 200);
});
</script>

</body>
</html>

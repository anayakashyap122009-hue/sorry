<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heart Memory 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* start screen */
.startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: pink;
  box-shadow: 0 0 20px pink;
}

/* title */
.title {
  position: absolute;
  top: 15px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  text-shadow: 0 0 10px pink;
  z-index: 5;
}

/* HEART GRID using custom placement */
.grid {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.grid img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  position: absolute;
  border-radius: 10px;
  transition: 0.5s;
}

/* floating animation */
.float {
  position: absolute !important;
  animation: floatAnim 6s ease-in-out infinite;
  box-shadow: 0 0 15px pink;
}

@keyframes floatAnim {
  0%   { transform: translate(0,0); }
  25%  { transform: translate(50px,-80px); }
  50%  { transform: translate(-40px,-160px); }
  75%  { transform: translate(30px,-240px); }
  100% { transform: translate(0,-320px); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="title">💖 I Love You Lakshita Sharma 💖</div>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Start 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="grid" id="grid"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start() {
  document.getElementById("startScreen").style.display = "none";

  const grid = document.getElementById("grid");
  const music = document.getElementById("music");

  music.play().catch(()=>{});

  let imgs = [];

  // HEART SHAPE COORDINATES (25 positions)
  const positions = [
    [60,40],[100,40],[140,40],[180,40],[220,40],
    [40,80],[80,80],[120,80],[160,80],[200,80],
    [30,120],[70,120],[110,120],[150,120],[190,120],
    [50,160],[90,160],[130,160],[170,160],[210,160],
    [80,200],[120,200],[160,200],
    [100,240],[140,240]
  ];

  // STEP 1: create heart puzzle
  for (let i = 1; i <= 25; i++) {
    const img = document.createElement("img");
    img.src = `img${i}.jpg`;

    img.style.left = positions[i-1][0] + "px";
    img.style.top = positions[i-1][1] + "px";

    grid.appendChild(img);
    imgs.push(img);
  }

  // STEP 2: reveal effect
  imgs.forEach((img, i) => {
    setTimeout(() => {
      img.style.transform = "scale(1)";
    }, i * 80);
  });

  // STEP 3: FLOAT ALL AFTER HEART COMPLETE
  setTimeout(() => {

    imgs.forEach(img => {
      let rect = img.getBoundingClientRect();

      img.classList.add("float");

      img.style.left = rect.left + "px";
      img.style.top = rect.top + "px";

      document.body.appendChild(img);
    });

  }, 5000);

}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sorry 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  width:100vw;
  overflow:hidden;
  font-family:Arial;

  /* 💖 full screen cute background */
  background:url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

/* dark soft overlay (no boxes, no lines) */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

/* center text */
.container{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  text-align:center;
}

p{
  color:white;
  font-size:20px;
  line-height:2;
  text-shadow:0 0 15px pink;
  max-width:90%;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <p>
    sorryy forr everythingg ❤️<br>
    sorryy forr makingg your mood off 🥺<br>
    i never meant to bee butt i did 💔<br>
    i'm soo sorryyy 💖<br>
    i'll alwayss lovee youuu 💕
  </p>
</div>

</body>
</html>

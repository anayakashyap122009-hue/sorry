<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

/* 🌳 CONTAINER */
.tree {
    position: relative;
    width: 100vw;
    height: 100dvh; /* 🔥 FIX FOR MOBILE HEIGHT */
}

/* 🌳 TREE IMAGE */
.tree-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain; /* 🔥 NO CUT ON PHONE */
    z-index: 3;
}

/* 🖼️ GALLERY */
.gallery {
    position: absolute;
    width: 100%;
    height: 100%;
    display: grid;

    /* 🔥 RESPONSIVE GRID */
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 3px;

    -webkit-mask-image: url('tree.jpg');
    mask-image: url('tree.jpg');
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;

    z-index: 1;
}

/* 💖 IMAGES */
.gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(0.5);
    animation: appear 0.8s forwards;
}

/* ✨ ANIMATION */
@keyframes appear {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* 💬 TEXT */
.text {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px; /* 🔥 smaller for phone */
    padding: 0 10px;
    text-shadow: 0 0 15px pink, 0 0 30px red;
    z-index: 4;
}

/* 💕 HEARTS */
.heart {
    position: absolute;
    color: pink;
    font-size: 18px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(100dvh) scale(0.5);
        opacity: 0;
    }
    50% { opacity: 1; }
    100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio autoplay loop>
    <source src="song.mp3" type="audio/mp3">
</audio>

<div class="tree">

    <!-- 🖼️ IMAGES -->
    <div class="gallery">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
        <img src="img6.jpg">
        <img src="img7.jpg">
        <img src="img8.jpg">
        <img src="img9.jpg">
        <img src="img10.jpg">
        <img src="img11.jpg">
        <img src="img12.jpg">
        <img src="img13.jpg">
        <img src="img14.jpg">
        <img src="img15.jpg">
        <img src="img16.jpg">
        <img src="img17.jpg">
        <img src="img18.jpg">
        <img src="img19.jpg">
        <img src="img20.jpg">
        <img src="img21.jpg">
        <img src="img22.jpg">
        <img src="img23.jpg">
        <img src="img24.jpg">
        <img src="img25.jpg">
    </div>

    <!-- 🌳 TREE -->
    <img src="tree.jpg" class="tree-img">

    <!-- 💖 TEXT -->
    <div class="text" id="loveText">
        I loveeeee youuuuuu sooo muchhh myyy darlinggg ❤️
    </div>

</div>

<script>
/* 🎬 IMAGE DELAY */
const images = document.querySelectorAll(".gallery img");
images.forEach((img, index) => {
    img.style.animationDelay = (index * 0.25) + "s";
});

/* 💬 TEXT CHANGE */
setTimeout(() => {
    document.getElementById("loveText").innerHTML =
    "I’mmmm sooo sorrryyyyy myyy loveeee… pleaseee forgiveeee meee ❤️";
}, 8000);

/* 💕 HEARTS */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 400);
</script>

</body>
</html>

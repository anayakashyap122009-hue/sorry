<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forever Story 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background: url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

/* overlay */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

/* start screen */
.startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:pink;
  box-shadow:0 0 20px pink;
  font-size:18px;
}

/* TOP HEART */
.top{
  position:absolute;
  top:0;
  width:100%;
  height:55vh;
}

/* images */
.photo{
  width:55px;
  height:55px;
  position:absolute;
  border-radius:10px;
  object-fit:cover;
}

/* BOTTOM STORY AREA */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:45vh;
  overflow:hidden;
  background:rgba(0,0,0,0.35);
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* vertical text */
.story{
  width:90%;
  color:white;
  font-size:18px;
  line-height:1.8;
  text-align:center;
  text-shadow:0 0 10px pink;

  transform:translateY(100%);
  animation:scrollUp 40s linear forwards;
}

@keyframes scrollUp{
  from{transform:translateY(100%);}
  to{transform:translateY(-100%);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Start 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="top" id="top"></div>

<div class="bottom">
  <div class="story" id="story"></div>
</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start(){
  document.getElementById("startScreen").style.display="none";

  const top=document.getElementById("top");
  const story=document.getElementById("story");
  const music=document.getElementById("music");

  music.play().catch(()=>{});

  // 💖 HEART POSITIONS
  const pos=[
    [60,30],[110,30],[160,30],[210,30],[260,30],
    [40,70],[90,70],[140,70],[190,70],[240,70],
    [30,120],[80,120],[130,120],[180,120],[230,120],
    [50,170],[100,170],[150,170],[200,170],[250,170],
    [90,220],[140,220],[190,220],
    [110,270],[160,270]
  ];

  let imgs=[];

  for(let i=1;i<=25;i++){
    const img=document.createElement("img");
    img.src=`img${i}.jpg`;
    img.className="photo";

    img.style.left=pos[i-1][0]+"px";
    img.style.top=pos[i-1][1]+"px";

    top.appendChild(img);
    imgs.push(img);
  }

  // show heart
  imgs.forEach((img,i)=>{
    setTimeout(()=>{
      img.style.opacity="1";
    },i*80);
  });

  // 💖 VERTICAL STORY TEXT
  const text =
  "I am truly sorry for everything. You are the most important person in my life. I never want to lose you. Every mistake I made taught me how much you mean to me. I promise to change, to understand you better, and to always respect your feelings. You are my peace, my happiness, and my forever. No matter what happens, my heart always chooses you... ";

  let bigText="";
  for(let i=0;i<300;i++){
    bigText += text + " ";
  }

  story.innerHTML = bigText;
}
</script>

</body>
</html>

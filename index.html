<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heart & Words 💖</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#1a001f,#000);
  font-family:Arial;
  overflow:hidden;
}

/* START SCREEN */
.startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:pink;
  box-shadow:0 0 20px pink;
  font-size:18px;
}

/* TOP HEART AREA */
.top{
  position:absolute;
  top:0;
  width:100%;
  height:50vh;
}

/* BOTTOM TEXT AREA */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:50vh;
  color:white;
  padding:10px 15px;
  overflow-y:auto;
  text-align:center;
  font-size:15px;
  line-height:1.6;
  text-shadow:0 0 10px pink;
}

/* images */
.photo{
  width:55px;
  height:55px;
  object-fit:cover;
  position:absolute;
  border-radius:10px;
  transition:1s;
}

/* scroll look */
.bottom::-webkit-scrollbar{
  display:none;
}
</style>
</head>

<body>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Start 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="top" id="top"></div>

<div class="bottom" id="bottom"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start(){
  document.getElementById("startScreen").style.display="none";

  const top=document.getElementById("top");
  const bottom=document.getElementById("bottom");
  const music=document.getElementById("music");

  music.play().catch(()=>{});

  // 💖 HEART POSITIONS (top half only)
  const pos=[
    [60,20],[110,20],[160,20],[210,20],[260,20],
    [40,60],[90,60],[140,60],[190,60],[240,60],
    [30,100],[80,100],[130,100],[180,100],[230,100],
    [50,140],[100,140],[150,140],[200,140],[250,140],
    [90,180],[140,180],[190,180],
    [110,220],[160,220]
  ];

  let imgs=[];

  for(let i=1;i<=25;i++){
    const img=document.createElement("img");
    img.src=`img${i}.jpg`;
    img.className="photo";

    img.style.left=pos[i-1][0]+"px";
    img.style.top=pos[i-1][1]+"px";

    top.appendChild(img);
    imgs.push(img);
  }

  // show heart
  imgs.forEach((img,i)=>{
    setTimeout(()=>{
      img.style.opacity="1";
    },i*80);
  });

  // 💖 LONG APOLOGY TEXT (BOTTOM HALF)
  setTimeout(()=>{

    const text =
    "I am truly sorry for everything I ever did that hurt you. " +
    "You are the most important person in my life and I never want to lose you. " +
    "Every mistake I made taught me how precious you are to me. " +
    "I promise to improve myself, to understand you better, and to never repeat my mistakes again. " +
    "You are my peace, my happiness, and my favorite part of life. " +
    "No matter how far we are or how hard things get, my feelings for you will always stay the same. ";

    let bigText="";
    for(let i=0;i<500;i++){
      bigText += text + " ";
    }

    let i=0;

    function type(){
      if(i<bigText.length){
        bottom.innerHTML += bigText[i]===" " ? "&nbsp;" : bigText[i];
        i++;
        setTimeout(type,5);
      }
    }

    type();

  },3000);

}
</script>

</body>
</html>

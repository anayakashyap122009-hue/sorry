<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Love Story 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background: url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

/* soft romantic overlay */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

/* start screen */
.startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:pink;
  box-shadow:0 0 20px pink;
  font-size:18px;
}

/* TOP HEART AREA */
.top{
  position:absolute;
  top:0;
  width:100%;
  height:60vh;
}

/* images */
.photo{
  width:55px;
  height:55px;
  position:absolute;
  border-radius:10px;
  object-fit:cover;
}

/* BOTTOM TICKER AREA */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:40vh;
  overflow:hidden;
  background:rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
}

/* scrolling text */
.ticker{
  white-space:nowrap;
  color:white;
  font-size:18px;
  text-shadow:0 0 10px pink;
  animation:scroll 60s linear infinite;
  padding-left:100%;
}

@keyframes scroll{
  from{transform:translateX(0);}
  to{transform:translateX(-100%);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Enter 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="top" id="top"></div>

<div class="bottom">
  <div class="ticker" id="ticker"></div>
</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start(){
  document.getElementById("startScreen").style.display="none";

  const top=document.getElementById("top");
  const ticker=document.getElementById("ticker");
  const music=document.getElementById("music");

  music.play().catch(()=>{});

  // 💖 HEART POSITIONS
  const pos=[
    [60,30],[110,30],[160,30],[210,30],[260,30],
    [40,70],[90,70],[140,70],[190,70],[240,70],
    [30,120],[80,120],[130,120],[180,120],[230,120],
    [50,170],[100,170],[150,170],[200,170],[250,170],
    [90,220],[140,220],[190,220],
    [110,270],[160,270]
  ];

  let imgs=[];

  for(let i=1;i<=25;i++){
    const img=document.createElement("img");
    img.src=`img${i}.jpg`;
    img.className="photo";

    img.style.left=pos[i-1][0]+"px";
    img.style.top=pos[i-1][1]+"px";

    top.appendChild(img);
    imgs.push(img);
  }

  // show heart
  imgs.forEach((img,i)=>{
    setTimeout(()=>{
      img.style.opacity="1";
    },i*80);
  });

  // 💖 LONG ROMANTIC HORIZONTAL PARA
  const text =
  "I am truly sorry for everything I did, you mean the world to me, I will always care for you, I will always respect you, you are my happiness, my peace, my smile, my forever... ";

  let bigText="";
  for(let i=0;i<200;i++){
    bigText += text + " ❤️ ";
  }

  ticker.innerHTML = bigText;

}
</script>

</body>
</html>




<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forever Sorry 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle,#1a001f,#000);
  font-family:Arial;
}

.startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:pink;
  box-shadow:0 0 20px pink;
  font-size:18px;
}

/* stage */
.stage{
  position:relative;
  width:100vw;
  height:100vh;
}

/* images */
.photo{
  width:55px;
  height:55px;
  position:absolute;
  object-fit:cover;
  border-radius:10px;
  opacity:0;
  transform:scale(0);
  transition:1s;
  box-shadow:0 0 10px rgba(255,192,203,0.3);
}

/* floating */
.float{
  animation:floatAnim 6s ease-in-out infinite;
}

@keyframes floatAnim{
  0%{transform:translate(0,0);}
  25%{transform:translate(40px,-60px);}
  50%{transform:translate(-40px,-140px);}
  75%{transform:translate(30px,-220px);}
  100%{transform:translate(0,-300px);}
}

/* paragraph */
#para{
  position:absolute;
  bottom:20px;
  width:90%;
  left:5%;
  color:white;
  font-size:18px;
  text-align:center;
  line-height:1.8;
  text-shadow:0 0 10px pink;
  z-index:20;
  max-height:40vh;
  overflow:auto;
}
</style>
</head>

<body>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Start 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="stage" id="stage"></div>

<div id="para"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start(){
  document.getElementById("startScreen").style.display="none";

  const stage=document.getElementById("stage");
  const music=document.getElementById("music");
  const para=document.getElementById("para");

  music.play().catch(()=>{});

  let imgs=[];

  // 💖 HEART POSITIONS
  const pos=[
    [60,40],[110,40],[160,40],[210,40],[260,40],
    [40,80],[90,80],[140,80],[190,80],[240,80],
    [30,130],[80,130],[130,130],[180,130],[230,130],
    [50,180],[100,180],[150,180],[200,180],[250,180],
    [90,230],[140,230],[190,230],
    [110,280],[160,280]
  ];

  for(let i=1;i<=25;i++){
    const img=document.createElement("img");
    img.src=`img${i}.jpg`;
    img.className="photo";

    img.style.left=pos[i-1][0]+"px";
    img.style.top=pos[i-1][1]+"px";

    stage.appendChild(img);
    imgs.push(img);
  }

  // show heart
  imgs.forEach((img,i)=>{
    setTimeout(()=>{
      img.style.opacity="1";
      img.style.transform="scale(1)";
    },i*80);
  });

  // float + start letter after formation
  setTimeout(()=>{

    imgs.forEach(img=>{
      let r=img.getBoundingClientRect();
      img.classList.add("float");
      img.style.left=r.left+"px";
      img.style.top=r.top+"px";
      document.body.appendChild(img);
    });

    startLongApology();

  },6000);
}

/* 💖 GENERATE LONG APOLOGY (SAFE 20K+ WORD STYLE) */
function startLongApology(){

  const base =
  "I am truly sorry for everything I ever did that hurt you. " +
  "You are the most important person in my life and I never want to lose you. " +
  "Every mistake I made, I carry it in my heart and I wish I could go back and fix it. ";

  let bigText = "";
  for(let i=0;i<800;i++){ // generates HUGE paragraph safely
    bigText += base + " ";
  }

  const para=document.getElementById("para");
  let i=0;

  function type(){
    if(i<bigText.length){
      para.innerHTML += bigText[i]===" " ? "&nbsp;" : bigText[i];
      i++;
      setTimeout(type,10); // smooth fast typing
    }
  }

  type();
}
</script>

</body>
</html>

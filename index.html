<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forever Us 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

/* dark overlay */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
}

/* start screen */
.startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:pink;
  box-shadow:0 0 20px pink;
  font-size:18px;
}

/* TOP HEART AREA */
.top{
  position:absolute;
  top:0;
  width:100%;
  height:55vh;
}

/* images */
.photo{
  width:55px;
  height:55px;
  position:absolute;
  border-radius:10px;
  object-fit:cover;
}

/* BOTTOM STORY AREA */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:45vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.35);
}

/* story text */
.story{
  width:90%;
  color:white;
  font-size:18px;
  line-height:1.8;
  text-align:center;
  text-shadow:0 0 10px pink;
}

.line{
  opacity:0;
  transform:translateY(10px);
  transition:1s ease;
}

.line.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Start 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="top" id="top"></div>

<div class="bottom">
  <div class="story" id="story"></div>
</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start(){
  document.getElementById("startScreen").style.display="none";

  const top=document.getElementById("top");
  const story=document.getElementById("story");
  const music=document.getElementById("music");

  music.play().catch(()=>{});

  /* 💖 HEART POSITIONS */
  const pos=[
    [60,20],[110,20],[160,20],[210,20],[260,20],
    [40,60],[90,60],[140,60],[190,60],[240,60],
    [30,110],[80,110],[130,110],[180,110],[230,110],
    [50,160],[100,160],[150,160],[200,160],[250,160],
    [90,210],[140,210],[190,210],
    [110,260],[160,260]
  ];

  let imgs=[];

  for(let i=1;i<=25;i++){
    const img=document.createElement("img");
    img.src=`img${i}.jpg`;
    img.className="photo";

    img.style.left=pos[i-1][0]+"px";
    img.style.top=pos[i-1][1]+"px";

    top.appendChild(img);
    imgs.push(img);
  }

  /* show heart */
  imgs.forEach((img,i)=>{
    setTimeout(()=>{
      img.style.opacity="1";
    },i*80);
  });

  /* 💖 LINE BY LINE STORY */
  setTimeout(()=>{

    const lines=[
      "I am truly sorry for everything I did.",
      "You are the most important person in my life.",
      "I never want to lose you.",
      "Every mistake made me realize your value.",
      "You are my peace, my happiness, my forever.",
      "Without you, everything feels incomplete.",
      "I promise to become better for you.",
      "I promise to understand you more deeply.",
      "I promise to always respect you.",
      "If I could rewrite my past, I would choose you every time.",
      "You are my heart, my soul, my everything."
    ];

    story.innerHTML="";

    let i=0;

    function showLine(){
      if(i<lines.length){

        const div=document.createElement("div");
        div.className="line";
        div.innerText=lines[i];

        story.appendChild(div);

        setTimeout(()=>div.classList.add("show"),100);

        i++;
        setTimeout(showLine,2000); // slow readable speed
      }
    }

    showLine();

  },3000);

}
</script>

</body>
</html>

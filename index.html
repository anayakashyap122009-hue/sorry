<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forever Cinematic 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background: radial-gradient(circle,#1a001f,#000);
}

/* START */
.startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

button{
  padding:15px 35px;
  border:none;
  border-radius:30px;
  background:pink;
  box-shadow:0 0 25px pink;
  font-size:18px;
}

/* TOP HEART */
.top{
  position:absolute;
  top:0;
  width:100%;
  height:50vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* HEART container pulse */
.heartBox{
  width:260px;
  height:260px;
  position:relative;
  animation:beat 1.5s infinite;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

/* images */
.photo{
  width:52px;
  height:52px;
  position:absolute;
  border-radius:10px;
  object-fit:cover;
}

/* BOTTOM STORY */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:50vh;
  overflow:hidden;
  background:rgba(0,0,0,0.35);
  display:flex;
  justify-content:center;
  align-items:center;
}

.story{
  width:90%;
  color:white;
  font-size:17px;
  line-height:1.8;
  text-align:center;
  text-shadow:0 0 10px pink;

  transform:translateY(100%);
  animation:scrollUp 45s linear forwards;
}

@keyframes scrollUp{
  from{transform:translateY(100%);}
  to{transform:translateY(-120%);}
}

/* FINAL TEXT */
.finalLove{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:20px;
  color:pink;
  font-size:22px;
  opacity:0;
  text-shadow:0 0 20px pink;
  animation:fadeIn 3s forwards;
  animation-delay:40s;
}

@keyframes fadeIn{
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Enter Our Memory 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="top">
  <div class="heartBox" id="heartBox"></div>
</div>

<div class="bottom">
  <div class="story" id="story"></div>
</div>

<div class="finalLove">💖 I LOVE YOU 💖</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start(){
  document.getElementById("startScreen").style.display="none";

  const heartBox=document.getElementById("heartBox");
  const story=document.getElementById("story");
  const music=document.getElementById("music");

  music.play().catch(()=>{});

  // 💖 HEART POSITIONS (inside box)
  const pos=[
    [20,20],[70,20],[120,20],[170,20],[220,20],
    [10,70],[60,70],[110,70],[160,70],[210,70],
    [0,120],[50,120],[100,120],[150,120],[200,120],
    [20,170],[70,170],[120,170],[170,170],[220,170],
    [60,220],[110,220],[160,220],
    [80,270],[130,270]
  ];

  for(let i=1;i<=25;i++){
    const img=document.createElement("img");
    img.src=`img${i}.jpg`;
    img.className="photo";

    img.style.left=pos[i-1][0]+"px";
    img.style.top=pos[i-1][1]+"px";

    heartBox.appendChild(img);
  }

  // 💖 LONG CINEMATIC STORY
  const text =
  "I am truly sorry for everything I did wrong. You are not just someone in my life, you are my entire emotional world. Every moment without you feels incomplete. I promise to become better, to understand you deeper, and to never hurt you again. You are my peace, my happiness, and my forever. If I could rewrite my past, I would only rewrite it for you... ";

  let big="";
  for(let i=0;i<400;i++){
    big+=text+" ";
  }

  story.innerHTML=big;
}
</script>

</body>
</html>

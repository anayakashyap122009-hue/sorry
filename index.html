<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PUZZLE GRID */
.puzzle{
  width:95vmin;
  height:95vmin;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:2px;
}

/* EACH IMAGE PIECE */
.piece{
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:scale(0.7);
  transition:0.4s ease;
}

.show{
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<div class="puzzle" id="puzzle"></div>

<script>
let puzzle = document.getElementById("puzzle");

/* LOAD ALL 25 IMAGES */
for(let i=1;i<=25;i++){

  let piece = document.createElement("div");
  piece.className = "piece";

  // 🔥 THIS LINE USES YOUR 25 IMAGES
  piece.style.backgroundImage = "url('" + i + ".jpg')";

  puzzle.appendChild(piece);

  // 🎬 animation one by one
  setTimeout(()=>{
    piece.classList.add("show");
  }, i*150);
}
</script>

</body>
</html>

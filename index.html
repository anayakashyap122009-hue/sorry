<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Memory Puzzle 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

/* dark romantic overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  z-index: 0;
}

/* start screen */
.startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

.startScreen h1 {
  color: white;
  text-shadow: 0 0 10px pink;
}

button {
  padding: 15px 35px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: pink;
  cursor: pointer;
  box-shadow: 0 0 20px pink;
}

/* title */
.title {
  position: absolute;
  top: 15px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  text-shadow: 0 0 10px pink;
  z-index: 2;
}

/* grid puzzle */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 2px;
  width: 90vw;
  max-width: 500px;
  margin: auto;
  margin-top: 70px;
  opacity: 0;
  transition: 1s ease;
  z-index: 2;
  position: relative;
}

.grid.show {
  opacity: 1;
}

/* puzzle shape effect */
.grid img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;

  clip-path: polygon(
    10% 0%, 90% 0%, 100% 20%, 100% 80%,
    90% 100%, 10% 100%, 0% 80%, 0% 20%
  );

  transform: scale(0.7);
  opacity: 0;
  transition: 0.5s ease;
  filter: brightness(0.9);
}

.grid img.show {
  transform: scale(1);
  opacity: 1;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="title">💖 I Love You Lakshita Sharma 💖</div>

<!-- START SCREEN -->
<div class="startScreen" id="startScreen">
  <h1>💖 Tap to Start 💖</h1>
  <button onclick="start()">Start Memory</button>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start() {
  document.getElementById("startScreen").style.display = "none";

  const grid = document.getElementById("grid");
  const music = document.getElementById("music");

  grid.classList.add("show");

  // play music (after click → works in browser)
  music.play().catch(err => console.log("Autoplay blocked"));

  // create 25 images
  for (let i = 1; i <= 25; i++) {
    const img = document.createElement("img");
    img.src = `img${i}.jpg`;
    grid.appendChild(img);
  }

  // animation reveal
  const imgs = document.querySelectorAll("img");

  imgs.forEach((img, index) => {
    setTimeout(() => {
      img.classList.add("show");
    }, index * 120);
  });
}
</script>

</body>
</html>

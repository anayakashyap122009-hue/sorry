<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Puzzle Memory 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
}

/* start screen */
.startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: pink;
  box-shadow: 0 0 20px pink;
}

/* title */
.title {
  position: absolute;
  top: 15px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 20px;
  text-shadow: 0 0 10px pink;
  z-index: 5;
}

/* PUZZLE GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  width: 90vw;
  max-width: 500px;
  gap: 2px;
  margin: auto;
  margin-top: 70px;
  position: relative;
  z-index: 2;
}

.grid img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;

  /* puzzle shape */
  clip-path: polygon(
    10% 0%, 90% 0%, 100% 20%, 100% 80%,
    90% 100%, 10% 100%, 0% 80%, 0% 20%
  );

  transition: 0.5s;
}

/* FLOAT MODE */
.float {
  position: absolute !important;
  width: 80px !important;
  height: 80px !important;
  border-radius: 10px;
  opacity: 0.95;
  animation: floatAnim 6s infinite ease-in-out;
}

@keyframes floatAnim {
  0%   { transform: translate(0,0) rotate(0deg); }
  25%  { transform: translate(40px,-60px) rotate(8deg); }
  50%  { transform: translate(-40px,-140px) rotate(-8deg); }
  75%  { transform: translate(30px,-220px) rotate(10deg); }
  100% { transform: translate(0,-300px) rotate(0deg); }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="title">💖 I Love You Lakshita Sharma 💖</div>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Start 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="grid" id="grid"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start() {
  document.getElementById("startScreen").style.display = "none";

  const grid = document.getElementById("grid");
  const music = document.getElementById("music");

  music.play().catch(()=>{});

  let imgs = [];

  // STEP 1: CREATE PUZZLE
  for (let i = 1; i <= 25; i++) {
    const img = document.createElement("img");
    img.src = `img${i}.jpg`;
    grid.appendChild(img);
    imgs.push(img);
  }

  // STEP 2: SHOW PUZZLE ANIMATION
  imgs.forEach((img, i) => {
    setTimeout(() => {
      img.style.transform = "scale(1)";
    }, i * 80);
  });

  // STEP 3: AFTER PUZZLE COMPLETE → FLOAT
  setTimeout(() => {

    imgs.forEach(img => {
      let rect = img.getBoundingClientRect();

      img.classList.add("float");

      img.style.left = rect.left + "px";
      img.style.top = rect.top + "px";

      document.body.appendChild(img);
    });

  }, 5000); // wait 5 sec puzzle then float
}
</script>

</body>
</html>

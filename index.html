<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

/* 🌳 CONTAINER */
.tree {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* 🌳 TREE IMAGE */
.tree-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 3;
}

/* 🖼️ GALLERY */
.gallery {
    position: absolute;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;

    -webkit-mask-image: url('tree.png');
    mask-image: url('tree.png');
    -webkit-mask-size: cover;
    mask-size: cover;
    z-index: 1;
}

/* 💖 IMAGES */
.gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(0.5);
    animation: appear 0.8s forwards;
}

/* ✨ IMAGE ANIMATION */
@keyframes appear {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* 💕 FLOATING HEARTS */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
    }
    50% {
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
    }
}

/* 💬 TEXT */
.text {
    position: absolute;
    bottom: 25px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 24px;
    text-shadow: 0 0 20px pink, 0 0 40px red;
    z-index: 4;
    transition: 1s;
}
</style>
</head>

<body>

<!-- 🎶 MUSIC -->
<audio autoplay loop>
    <source src="song.mp3" type="audio/mp3">
</audio>

<div class="tree">

    <!-- 🖼️ IMAGES -->
    <div class="gallery">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
        <img src="img6.jpg">
        <img src="img7.jpg">
        <img src="img8.jpg">
        <img src="img9.jpg">
        <img src="img10.jpg">
        <img src="img11.jpg">
        <img src="img12.jpg">
        <img src="img13.jpg">
        <img src="img14.jpg">
        <img src="img15.jpg">
        <img src="img16.jpg">
        <img src="img17.jpg">
        <img src="img18.jpg">
        <img src="img19.jpg">
        <img src="img20.jpg">
        <img src="img21.jpg">
        <img src="img22.jpg">
        <img src="img23.jpg">
        <img src="img24.jpg">
        <img src="img25.jpg">
    </div>

    <!-- 🌳 TREE -->
    <img src="tree.png" class="tree-img">

    <!-- 💖 TEXT -->
    <div class="text" id="loveText">
        I loveeeee youuuuuu sooo muchhh myyy darlinggg ❤️
    </div>

</div>

<script>
/* 🎬 IMAGE DELAY (REEL STYLE) */
const images = document.querySelectorAll(".gallery img");
images.forEach((img, index) => {
    img.style.animationDelay = (index * 0.25) + "s";
});

/* 💬 TEXT CHANGE (EMOTIONAL SWITCH) */
setTimeout(() => {
    document.getElementById("loveText").innerHTML =
    "I’mmmm sooo sorrryyyyy myyy loveeee… pleaseee forgiveeee meee ❤️";
}, 8000);

/* 💕 FLOATING HEARTS */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>

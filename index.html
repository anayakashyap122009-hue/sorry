<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* 💕 BACKGROUND */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7') center/cover no-repeat;
    filter: blur(6px) brightness(0.7);
    z-index: -1;
}

/* 📱 MOBILE PERFECT CENTER BOX */
.photo-container {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 90vw;        /* responsive */
    max-width: 420px;
    height: 65vh;
    transform: translate(-50%, -50%);
}

/* 📸 IMAGES */
.photo-container img {
    position: absolute;
    width: 22vw;
    max-width: 95px;
    height: 22vw;
    max-height: 95px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
    transition: 0.5s;
}

/* ✨ TEXT */
.love-text {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 6vw;
    max-font-size: 28px;
    color: white;
    text-shadow: 0 0 10px pink, 0 0 30px red;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 30px red, 0 0 60px pink; }
}

/* 💖 TAP SCREEN */
.start-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    z-index: 10;
}

/* 💖 HEARTS */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="start-screen" id="start">
    Tap to open ❤️
</div>

<div class="background"></div>

<div class="photo-container">

    <!-- 📸 YOUR 25 IMAGES -->
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
    <img src="5.jpg">
    <img src="6.jpg">
    <img src="7.jpg">
    <img src="8.jpg">
    <img src="9.jpg">
    <img src="10.jpg">
    <img src="11.jpg">
    <img src="12.jpg">
    <img src="13.jpg">
    <img src="14.jpg">
    <img src="15.jpg">
    <img src="16.jpg">
    <img src="17.jpg">
    <img src="18.jpg">
    <img src="19.jpg">
    <img src="20.jpg">
    <img src="21.jpg">
    <img src="22.jpg">
    <img src="23.jpg">
    <img src="24.jpg">
    <img src="25.jpg">

</div>

<div class="love-text">
    I loveeeee youuuu sooo muchhh ❤️
</div>

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const images = document.querySelectorAll(".photo-container img");
const music = document.getElementById("music");
const startScreen = document.getElementById("start");

/* 🎬 START ON TAP (MOBILE FIX) */
startScreen.addEventListener("click", () => {
    startScreen.style.display = "none";

    music.currentTime = 15; // skip intro
    music.play();

    startAnimation();
});

/* 📸 IMAGE ANIMATION */
function startAnimation() {
    images.forEach((img, i) => {
        let x = Math.random() * 70;
        let y = Math.random() * 80;

        img.style.left = x + "%";
        img.style.top = y + "%";

        let rotate = Math.random() * 20 - 10;
        img.style.transform = `rotate(${rotate}deg)`;

        img.style.opacity = 0;

        setTimeout(() => {
            img.style.opacity = 1;
        }, i * 200);
    });
}

/* 💖 HEARTS */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>]

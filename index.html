<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1518199266791-5375a83190b7") center/cover no-repeat;
}

/* dark overlay */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
}

/* start screen */
.startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

button{
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:pink;
  box-shadow:0 0 20px pink;
  font-size:18px;
}

/* TOP HEART */
.top{
  position:absolute;
  top:0;
  width:100%;
  height:55vh;
}

/* images */
.photo{
  width:55px;
  height:55px;
  position:absolute;
  border-radius:10px;
  object-fit:cover;
}

/* BOTTOM STORY */
.bottom{
  position:absolute;
  bottom:0;
  width:100%;
  height:45vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.35);
}

.story{
  width:90%;
  color:white;
  font-size:18px;
  line-height:1.8;
  text-align:center;
  text-shadow:0 0 10px pink;
}

.line{
  opacity:0;
  transform:translateY(10px);
  transition:1s ease;
}

.line.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="startScreen" id="startScreen">
  <h1 style="color:white;text-shadow:0 0 10px pink;">💖 Tap to Start 💖</h1>
  <button onclick="start()">Start</button>
</div>

<div class="top" id="top"></div>

<div class="bottom">
  <div class="story" id="story"></div>
</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function start(){
  document.getElementById("startScreen").style.display="none";

  const top=document.getElementById("top");
  const story=document.getElementById("story");
  const music=document.getElementById("music");

  music.play().catch(()=>{});

  /* 💖 HEART POSITIONS */
  const pos=[
    [60,20],[110,20],[160,20],[210,20],[260,20],
    [40,60],[90,60],[140,60],[190,60],[240,60],
    [30,110],[80,110],[130,110],[180,110],[230,110],
    [50,160],[100,160],[150,160],[200,160],[250,160],
    [90,210],[140,210],[190,210],
    [110,260],[160,260]
  ];

  let imgs=[];

  for(let i=1;i<=25;i++){
    const img=document.createElement("img");
    img.src=`img${i}.jpg`;
    img.className="photo";

    img.style.left=pos[i-1][0]+"px";
    img.style.top=pos[i-1][1]+"px";

    top.appendChild(img);
    imgs.push(img);
  }

  /* show heart */
  imgs.forEach((img,i)=>{
    setTimeout(()=>{
      img.style.opacity="1";
    },i*70);
  });

  /* 💖 SHORT CUTE + LOVE + APOLOGY */
  setTimeout(()=>{

    const lines=[
      "You are my favorite person 💖",
      "Your smile makes everything better 😊",
      "I love the way you exist in my life ✨",
      "You are my peace and my happiness 🌸",
      "I’m sorry for the moments I hurt you 🥺",
      "I never meant to make you sad 💔",
      "I promise to be better for you 💕",
      "I just want to stay with you always 💖"
    ];

    story.innerHTML="";

    let i=0;

    function showLine(){
      if(i<lines.length){
        const div=document.createElement("div");
        div.className="line";
        div.innerText=lines[i];

        story.appendChild(div);

        setTimeout(()=>div.classList.add("show"),100);

        i++;
        setTimeout(showLine,2200); // slow & readable
      }
    }

    showLine();

  },3000);

}
</script>

</body>
</html>

<!DOCTYPE html>

<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* 🌳 TREE BACKGROUND */
.tree {
    position: relative;
    width: 100vw;
    height: 100dvh;
    background: url('tree.jpg') center/contain no-repeat;
}

/* 🧩 SHAPES */
.shape {
    position: absolute;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transform: scale(0.5);
    animation: show 1s forwards;
}

/* ✨ ANIMATION */
@keyframes show {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* 💬 TEXT */
.text {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
    text-shadow: 0 0 10px pink;
}
</style>
</head>
